apiVersion: v1
kind: Namespace
metadata:
  name: verification

---
apiVersion: v1
kind: Secret
metadata:
  name: verification-secrets
  namespace: verification
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "rootpass123"
  MYSQL_PASSWORD: "verifpass123"
  DJANGO_SECRET_KEY: "django-insecure-demo-key-change-me"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-pvc
  namespace: verification
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app-data-pvc
  namespace: verification
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app-keys-pvc
  namespace: verification
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: static-pvc
  namespace: verification
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: verification-db
  namespace: verification
spec:
  replicas: 1
  selector:
    matchLabels:
      app: verification-db
  template:
    metadata:
      labels:
        app: verification-db
    spec:
      containers:
        - name: mariadb
          image: mariadb:10.11
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: verification-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: verification_db
            - name: MYSQL_USER
              value: verif_user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: verification-secrets
                  key: MYSQL_PASSWORD
          volumeMounts:
            - name: db-storage
              mountPath: /var/lib/mysql
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: db-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: verification-db
  namespace: verification
spec:
  selector:
    app: verification-db
  ports:
    - port: 3306
      targetPort: 3306
  type: ClusterIP

---
apiVersion: batch/v1
kind: Job
metadata:
  name: verification-migrate
  namespace: verification
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-db
          image: busybox
          command:
            - sh
            - -c
            - |
              until nc -z verification-db 3306; do
                echo "Waiting for MariaDB..."; sleep 3;
              done
      containers:
        - name: migrate
          image: verificationcontainer-web:latest
          imagePullPolicy: Never
          command: ["python", "manage.py", "migrate", "--noinput"]
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: django_project.settings
            - name: DB_HOST
              value: verification-db
            - name: MYSQL_DATABASE
              value: verification_db
            - name: MYSQL_USER
              value: verif_user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: verification-secrets
                  key: MYSQL_PASSWORD
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: verification-secrets
                  key: DJANGO_SECRET_KEY
            - name: ALLOWED_HOSTS
              value: "localhost,127.0.0.1,verification-nginx,verification-web,192.168.49.2"
            - name: CSRF_TRUSTED_ORIGINS
              value: "https://192.168.49.2:30443,http://192.168.49.2:30080"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: verification-web
  namespace: verification
spec:
  replicas: 1
  selector:
    matchLabels:
      app: verification-web
  template:
    metadata:
      labels:
        app: verification-web
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox
          command:
            - sh
            - -c
            - |
              until nc -z verification-db 3306; do
                echo "Waiting for MariaDB..."; sleep 3;
              done
        - name: collectstatic
          image: verificationcontainer-web:latest
          imagePullPolicy: Never
          command: ["python", "manage.py", "collectstatic", "--noinput"]
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: django_project.settings
            - name: DB_HOST
              value: verification-db
            - name: MYSQL_DATABASE
              value: verification_db
            - name: MYSQL_USER
              value: verif_user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: verification-secrets
                  key: MYSQL_PASSWORD
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: verification-secrets
                  key: DJANGO_SECRET_KEY
            - name: ALLOWED_HOSTS
              value: "localhost,127.0.0.1,verification-nginx,verification-web,192.168.49.2"
            - name: CSRF_TRUSTED_ORIGINS
              value: "https://192.168.49.2:30443,http://192.168.49.2:30080"
          volumeMounts:
            - name: static-storage
              mountPath: /app/staticfiles
      containers:
        - name: web
          image: verificationcontainer-web:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: django_project.settings
            - name: DB_HOST
              value: verification-db
            - name: MYSQL_DATABASE
              value: verification_db
            - name: MYSQL_USER
              value: verif_user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: verification-secrets
                  key: MYSQL_PASSWORD
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: verification-secrets
                  key: DJANGO_SECRET_KEY
            - name: ALLOWED_HOSTS
              value: "localhost,127.0.0.1,verification-nginx,verification-web,192.168.49.2"
            - name: CSRF_TRUSTED_ORIGINS
              value: "https://192.168.49.2:30443,http://192.168.49.2:30080"
          volumeMounts:
            - name: app-data
              mountPath: /app/data
            - name: app-keys
              mountPath: /app/keys
            - name: static-storage
              mountPath: /app/staticfiles
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: app-data-pvc
        - name: app-keys
          persistentVolumeClaim:
            claimName: app-keys-pvc
        - name: static-storage
          persistentVolumeClaim:
            claimName: static-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: verification-web
  namespace: verification
spec:
  selector:
    app: verification-web
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: verification-nginx-config
  namespace: verification
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        return 301 https://$host:30443$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/tls/tls.crt;
        ssl_certificate_key /etc/nginx/tls/tls.key;

        client_max_body_size 20M;

        location /static/ {
            alias /app/staticfiles/;
        }

        location /media/ {
            alias /app/data/;
        }

        location / {
            proxy_pass http://verification-web:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: verification-nginx
  namespace: verification
spec:
  replicas: 1
  selector:
    matchLabels:
      app: verification-nginx
  template:
    metadata:
      labels:
        app: verification-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:stable-alpine
          ports:
            - containerPort: 80
            - containerPort: 443
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: static-storage
              mountPath: /app/staticfiles
            - name: app-data
              mountPath: /app/data
            - name: tls-certs
              mountPath: /etc/nginx/tls
              readOnly: true
      volumes:
        - name: nginx-config
          configMap:
            name: verification-nginx-config
        - name: static-storage
          persistentVolumeClaim:
            claimName: static-pvc
        - name: app-data
          persistentVolumeClaim:
            claimName: app-data-pvc
        - name: tls-certs
          secret:
            secretName: verification-tls

---
apiVersion: v1
kind: Service
metadata:
  name: verification-nginx
  namespace: verification
spec:
  selector:
    app: verification-nginx
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
    - name: https
      port: 443
      targetPort: 443
      nodePort: 30443
  type: NodePort
