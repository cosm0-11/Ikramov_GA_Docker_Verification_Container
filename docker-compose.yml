services:

  db:
    image: mariadb:10.11
    container_name: verification_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: verification_db
      MYSQL_USER: verif_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - verif_net

  web:
    build: .
    container_name: verification_web
    restart: always
    depends_on:
      - db
    environment:
      - DJANGO_SETTINGS_MODULE=django_project.settings
    volumes:
      - ./data:/app/data
      - ./keys:/app/keys
      - static_volume:/app/staticfiles
    networks:
      - verif_net
    expose:
      - "8000"

  nginx:
    image: nginx:stable-alpine
    container_name: verification_nginx
    restart: always
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/certs:/etc/nginx/certs
      - static_volume:/app/staticfiles
      - ./data:/app/data
    networks:
      - verif_net

volumes:
  db_data:
  static_volume:

networks:
  verif_net:
    driver: bridge
